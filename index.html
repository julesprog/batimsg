<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArtisanMail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    /* === Ton CSS existant, inchangé === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #F5F3EE;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 2.5rem;
      max-width: 560px;
      width: 100%;
      box-shadow: 0 2px 24px rgba(0,0,0,0.07);
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: #666;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 0.4rem;
      margin-top: 1.2rem;
    }

    input, select {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid #E0DEDA;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      background: #FAFAF8;
      transition: border-color 0.2s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #C47A3A;
      background: white;
    }

    button.generate {
      width: 100%;
      margin-top: 1.8rem;
      padding: 0.9rem;
      background: #C47A3A;
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button.generate:hover { background: #A8632E; }
    button.generate:disabled { background: #ccc; cursor: not-allowed; }

    .result-box {
      margin-top: 1.5rem;
      background: #FAFAF8;
      border: 1.5px solid #E0DEDA;
      border-radius: 10px;
      padding: 1.2rem;
      font-size: 0.95rem;
      line-height: 1.6;
      white-space: pre-wrap;
      display: none;
    }

    .result-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .result-actions button {
      flex: 1;
      padding: 0.6rem;
      border-radius: 8px;
      border: 1.5px solid #E0DEDA;
      background: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .result-actions button:hover { border-color: #C47A3A; color: #C47A3A; }
    .error { color: #c0392b; font-size: 0.85rem; margin-top: 0.5rem; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>ArtisanMail</h1>
    <p class="subtitle">Génère un message professionnel en quelques secondes</p>

    <label for="prenom">Ton prénom</label>
    <input type="text" id="prenom" placeholder="ex. Marc" />

    <label for="metier">Ton métier</label>
    <input type="text" id="metier" placeholder="ex. Plombier, Électricien, Peintre…" />

    <label for="client">Nom du client</label>
    <input type="text" id="client" placeholder="ex. M. Dupont" />

    <label for="type">Type de message</label>
    <select id="type">
      <option value="relance_devis">Relance devis</option>
      <option value="confirmation_chantier">Confirmation chantier</option>
      <option value="demande_avis">Demande d'avis</option>
      <option value="autre">Autre</option>
    </select>

    <p class="error" id="erreur"></p>
    <button class="generate" id="btn" onclick="generer()">Générer le message</button>

    <div class="result-box" id="resultat"></div>
    <div class="result-actions" id="actions" style="display:none">
      <button onclick="copier()">📋 Copier</button>
      <button onclick="reinitialiser()">🔄 Recommencer</button>
    </div>
  </div>

  <script>
    async function generer() {
      const prenom = document.getElementById('prenom').value.trim();
      const metier = document.getElementById('metier').value.trim();
      const client = document.getElementById('client').value.trim();
      const type = document.getElementById('type').value;
      const erreur = document.getElementById('erreur');

      erreur.style.display = 'none';

      if (!prenom || !metier || !client) {
        erreur.textContent = 'Merci de remplir tous les champs.';
        erreur.style.display = 'block';
        return;
      }

      const btn = document.getElementById('btn');
      btn.disabled = true;
      btn.textContent = '⏳ Génération…';

      const typesMessages = {
        relance_devis: "relancer poliment un client qui n'a pas répondu à un devis",
        confirmation_chantier: "confirmer une date d'intervention à un client",
        demande_avis: "demander un avis Google ou une recommandation après un chantier terminé",
        autre: "envoyer un message professionnel et cordial"
      };

      // ✅ CHANGEMENT CLÉ : on appelle /api/generate (notre proxy Vercel)
      //    au lieu de https://api.anthropic.com directement.
      //    Pas de clé API ici — elle est sur le serveur.
      try {
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            system: `Tu es un assistant spécialisé dans la rédaction de messages professionnels courts pour les artisans français. Rédige uniquement le message, sans explication ni commentaire.`,
            messages: [{
              role: 'user',
              content: `Rédige un message pour ${typesMessages[type]}. L'artisan s'appelle ${prenom}, c'est un(e) ${metier}. Le client s'appelle ${client}. Ton professionnel, chaleureux, court (3-4 phrases max).`
            }]
          })
        });

        if (!response.ok) throw new Error('Erreur serveur');

        const data = await response.json();
        const texte = data.content[0].text;

        const res = document.getElementById('resultat');
        res.textContent = texte;
        res.style.display = 'block';
        document.getElementById('actions').style.display = 'flex';

      } catch (e) {
        erreur.textContent = 'Une erreur est survenue. Réessaie dans un instant.';
        erreur.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Générer le message';
      }
    }

    function copier() {
      const texte = document.getElementById('resultat').textContent;
      navigator.clipboard.writeText(texte).then(() => {
        const btn = event.target;
        btn.textContent = '✅ Copié !';
        setTimeout(() => btn.textContent = '📋 Copier', 2000);
      });
    }

    function reinitialiser() {
      document.getElementById('resultat').style.display = 'none';
      document.getElementById('actions').style.display = 'none';
      document.getElementById('prenom').value = '';
      document.getElementById('metier').value = '';
      document.getElementById('client').value = '';
    }
  </script>
</body>
</html>
